<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/theme.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/6fe0610783.js" crossorigin="anonymous"></script>
    <title>경빈's 블로그</title>

<body>
    <header>
        <div class="header-profile">
            <img src="./image/profile.png" alt="프로필 사진">
        </div>
    
        <div class="header-main">
            <h1>경빈's 블로그</h1>
            <p>하이</p>
        </div>
    
        <a
          class="header-github"
          href="https://github.com/gyeongbibin"
          target="_blank"
          aria-label="깃허브"
        >
          <i class="fa-brands fa-github"></i>
        </a>
    </header>

    <main>
      <aside class="sidebar">
        <nav class="sidebar-nav" aria-label="사이드바">
          <ul class="sidebar-list">
            <li><a href="#photo" class="sidebar-link">포토덤프</a></li>
            <li><a href="#like" class="sidebar-link">좋아하는 것</a></li>
            <li><a href="#interest" class="sidebar-link">내 관심사</a></li>
            <li><a href="#to" class="sidebar-link">To. 웹왔니</a></li>
          </ul>
        </nav>
      </aside>

      <section id="photo" class="section-photo">
        <h2 class="section-title">🎬 포토덤프</h2>
        <div class="grid-photo">
          <div class="item">
            <img src="./image/band.png" alt="밴드 공연 사진" />
          </div>
          <div class="item">
            <img src="./image/me.png" alt="증명 사진" />
          </div>
          <div class="item">
            <img src="./image/concert.png" alt="콘서트 떄 사진" />
          </div>
          <div class="item">
            <img src="./image/dive.png" alt="솝커톤 사진" />
          </div>
          <div class="item">
            <img
              src="./image/osaka.png" alt="오사카 여행 사진"
            />
          </div>
          <div class="item">
            <img src="./image/jeju.png" alt="제주도 여행 사진" />
          </div>
        </div>
      </section>

      <section id="like">

          <div class="section-like-list">
            <div class="section-like-item">
              <img src="./image/moonnambi.png" alt="달나라 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/machonambi.png" alt="마초 냄비" />

            <div class="section-like-item">
              <img src="./image/koreannambi.png" alt="애국자 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/pignambi.png" alt="돼지 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/policenambi.png" alt="경찰 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/christmasnambi.png" alt="산타 냄비" />
            </div>
            <!-- 무한 루프 복제 -->
            <div class="section-like-item">
              <img src="./image/moonnambi.png" alt="달나라 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/machonambi.png" alt="마초 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/koreannambi.png" alt="애국자 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/pignambi.png" alt="돼지 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/policenambi.png" alt="경찰 냄비" />
            </div>
            <div class="section-like-item">
              <img src="./image/christmasnambi.png" alt="산타 냄비" />
            </div>
          </div>
        </div>
      </section>
      <section id="interest" class="section-interest">
        <h2 class="section-title">💚 내 관심사</h2>
        <div class="interest-grid">
          <article class="interest-card">
            <div class="interest-thumb">
              <img src="./image/backnumber.png" alt="BackNumber" />
            </div>
            <h3 class="interest-title">BackNumber</h3>
            <div class="interest-actions">
              <button type="button" class="interest-btn interest-btn--like">좋아요</button>
              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>
            </div>
          </article>

          <article class="interest-card">
            <div class="interest-thumb">
              <img src="./image/chicken.png" alt="치킨" />
            </div>
            <h3 class="interest-title">치킨</h3>
            <div class="interest-actions">
              <button type="button" class="interest-btn interest-btn--like">좋아요</button>
              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>
            </div>

          <article class="interest-card">

              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>
            </div>
          </article>

          <article class="interest-card">
            <div class="interest-thumb">
              <img src="./image/seonghunchoo.png" alt="추성훈" />
            </div>
            <h3 class="interest-title">추성훈</h3>
            <div class="interest-actions">
              <button type="button" class="interest-btn interest-btn--like">좋아요</button>
              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>

              <img src="./image/huntdog.png" alt="사냥개들" />

            <div class="interest-actions">

              <img src="./image/meet.png" alt="지금만나러갑니다" />
            </div>
            <h3 class="interest-title">지금만나러갑니다</h3>
            <div class="interest-actions">
              <button type="button" class="interest-btn interest-btn--like">좋아요</button>
              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>
            </div>

          <article class="interest-card">
            <div class="interest-thumb">
              <img src="./image/samgyeopsal.png" alt="삼겹살" />
            </div>
            <h3 class="interest-title">삼겹살</h3>
            <div class="interest-actions">
              <button type="button" class="interest-btn interest-btn--like">좋아요</button>
              <button type="button" class="interest-btn interest-btn--hate">싫어요</button>

        <h2 class="section-title">To. 우리집에 웹왔니</h2>

        <div class="to-card">
          <ul class="to-list">
            <li class="to-item is-done">다함께 좋은추억을 !</li>
            <li class="to-item is-done">다함께 좋은 플젝을 !</li>
          </ul>

    <footer class="footer">
      <p class="footer-text">Thank you!</p>
